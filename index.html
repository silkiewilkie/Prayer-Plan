<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Prayer Plan" />
  <title>Personal Prayer Plan</title>
  <script>
    /* Apply the saved theme + style before paint to avoid a flash. */
    (function () {
      try {
        var t = localStorage.getItem("prayerPlan.theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
        var s = localStorage.getItem("prayerPlan.style");
        if (s && /^(ancient|celestial|liturgical|scroll)$/.test(s)) document.documentElement.setAttribute("data-style", s);
        var skipped = localStorage.getItem("prayerPlan.gate") === "off";
        var hasSession = false;
        for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && /^sb-.*-auth-token$/.test(k)) { hasSession = true; break; } }
        if (!skipped && !hasSession) document.documentElement.classList.add("show-gate");
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Dancing+Script:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20" />
</head>
<body>
  <!-- SIGN-IN GATE (shown before the app when signed out; sync.js fills it) -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <div class="auth-logo">&#10013;</div>
      <h1>Personal Prayer Plan</h1>
      <p class="auth-tag">A daily rhythm of Adoration, Confession, Thanksgiving, and Supplication. Sign in to sync your plan across devices.</p>
      <div id="auth-gate-body"></div>
      <button type="button" id="gate-skip" class="auth-skip">Continue without an account</button>
    </div>
  </div>

  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Personal Prayer Plan</h1>
      <nav class="view-tabs" aria-label="Views" role="tablist">
        <button type="button" class="view-tab is-active" data-view="day">Today</button>
        <button type="button" class="view-tab" data-view="adoration">Adoration</button>
        <button type="button" class="view-tab" data-view="confession">Confession</button>
        <button type="button" class="view-tab" data-view="thanksgiving">Thanksgiving</button>
        <button type="button" class="view-tab" data-view="supplication">Supplication</button>
        <button type="button" class="view-tab" data-view="cards">Prayer Cards</button>
        <button type="button" class="view-tab" data-view="answered">Answered Prayers</button>
        <button type="button" class="view-tab" data-view="attributes">Attributes</button>
        <button type="button" class="view-tab" data-view="settings">Settings</button>
      </nav>
    </div>
  </header>

  <!-- DAY VIEW -->
  <main id="day-view" class="view">
    <nav class="day-nav" aria-label="Choose day">
      <button type="button" class="day-arrow" id="prev-day" aria-label="Previous day">&#8249;</button>
      <div class="day-heading" id="day-heading"></div>
      <button type="button" class="day-arrow" id="next-day" aria-label="Next day">&#8250;</button>
    </nav>

    <div class="today-mode" role="tablist" aria-label="View today as">
      <button type="button" class="mode-btn is-active" id="mode-list" data-mode="list">List</button>
      <button type="button" class="mode-btn" id="mode-cards" data-mode="cards">Cards</button>
    </div>

    <section id="day-content" class="day-content" aria-live="polite"></section>
  </main>

  <!-- BANK EDITOR VIEW -->
  <main id="bank-view" class="view is-hidden">
    <section id="bank-content"></section>
  </main>

  <!-- PRAYER CARDS VIEW -->
  <main id="cards-view" class="view is-hidden">
    <div class="cards-controls">
      <label class="filter-field">
        <span class="filter-label">Show</span>
        <select id="card-filter" class="filter-select">
          <option value="all">All</option>
          <option value="adoration">Adoration</option>
          <option value="confession">Confession</option>
          <option value="thanksgiving">Thanksgiving</option>
          <option value="supplication">Supplication</option>
        </select>
      </label>
    </div>
    <nav class="day-nav" aria-label="Flip through prayer cards">
      <button type="button" class="day-arrow" id="prev-card" aria-label="Previous card">&#8249;</button>
      <div class="card-counter" id="card-counter"></div>
      <button type="button" class="day-arrow" id="next-card" aria-label="Next card">&#8250;</button>
    </nav>
    <section id="cards-content"></section>
  </main>

  <!-- ANSWERED PRAYERS VIEW -->
  <main id="answered-view" class="view is-hidden">
    <section id="answered-content"></section>
  </main>

  <!-- ATTRIBUTES VIEW -->
  <main id="attributes-view" class="view is-hidden">
    <section class="attributes" id="attributes-content"></section>
  </main>

  <!-- SETTINGS VIEW -->
  <main id="settings-view" class="view is-hidden">
    <section id="account-box"></section>
    <section id="settings-content"></section>
  </main>

  <footer class="site-footer">
    <p>“Pray without ceasing.” &mdash; 1 Thessalonians 5:17</p>
  </footer>

  <!-- Order matters: config + supabase, then content, app, then sync. -->
  <script src="config.js?v=20"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js?v=20"></script>
  <script src="app.js?v=20"></script>
  <script src="sync.js?v=20"></script>
  <script>
    /* Register the service worker for offline / installable use. */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
