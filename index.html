<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
  <title>Weekly Prayer Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Weekly Prayer Plan</h1>
      <nav class="view-tabs" aria-label="Views" role="tablist">
        <button type="button" class="view-tab is-active" data-view="day">Daily</button>
        <button type="button" class="view-tab" data-view="attributes">Attributes</button>
      </nav>
    </div>
  </header>

  <!-- DAY VIEW -->
  <main id="day-view" class="view">
    <nav class="day-nav" aria-label="Choose day">
      <button type="button" class="day-arrow" id="prev-day" aria-label="Previous day">&#8249;</button>
      <div class="day-heading" id="day-heading"></div>
      <button type="button" class="day-arrow" id="next-day" aria-label="Next day">&#8250;</button>
    </nav>

    <section id="day-content" class="day-content" aria-live="polite"></section>
  </main>

  <!-- ATTRIBUTES VIEW -->
  <main id="attributes-view" class="view is-hidden">
    <section class="attributes" id="attributes-content"></section>
  </main>

  <footer class="site-footer">
    <p>“Pray without ceasing.” &mdash; 1 Thessalonians 5:17</p>
  </footer>

  <!-- data.js holds all editable content; app.js renders it. Order matters. -->
  <script src="data.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
